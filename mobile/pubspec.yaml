name: ecoguardian_x
description: Android-first mobile app for the EcoGuardian X environmental navigation robot.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  flutter_blue_plus: 1.32.12
  mobile_scanner: ^5.1.1
  socket_io_client: ^2.0.3+1
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.3
  permission_handler: ^11.3.1
  flutter_local_notifications: ^17.2.2
  flutter_mjpeg: ^2.0.4
  fl_chart: ^0.68.0
  supabase_flutter: ^2.5.6
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
